<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصروفات | نظام إدارة محل الكوتشيات</title>
    <style>
        /*
        ========================================
        EXPENSES PAGE - SHOE STORE MANAGEMENT SYSTEM
        VERSION: 2.0.0
        DESIGN: Minimal Black & White
        ========================================
        */

        /* -------------------------------------- */
        /* CSS RESET */
        /* -------------------------------------- */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif;
        }

        /* -------------------------------------- */
        /* VARIABLES */
        /* -------------------------------------- */
        
        :root {
            --pure-black: #000000;
            --pure-white: #ffffff;
            --off-white: #fafafa;
            --light-gray: #f0f0f0;
            --medium-gray: #cccccc;
            --dark-gray: #333333;
            --charcoal: #222222;
            --success: #2ecc71;
            --error: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.06);
            --shadow-xl: 0 20px 40px rgba(0, 0, 0, 0.12);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 30px;
            --radius-full: 9999px;
            
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* -------------------------------------- */
        /* BASE STYLES */
        /* -------------------------------------- */
        
        body {
            direction: rtl;
            background: var(--pure-white);
            color: var(--charcoal);
            line-height: 1.6;
            min-height: 100vh;
            padding: 30px 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(var(--light-gray) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            pointer-events: none;
            z-index: -1;
        }

        /* -------------------------------------- */
        /* HEADER */
        /* -------------------------------------- */
        
        .header {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px 30px;
            background: var(--pure-white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0,0,0,0.02) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            z-index: 1;
        }

        .back-button {
            width: 45px;
            height: 45px;
            border: 1px solid var(--light-gray);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--pure-white);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 1.2em;
            text-decoration: none;
            color: var(--charcoal);
        }

        .back-button:hover {
            border-color: var(--pure-black);
            transform: translateX(-5px) scale(1.1);
            box-shadow: var(--shadow-md);
        }

        .page-title {
            font-size: 1.8em;
            font-weight: 400;
            color: var(--charcoal);
        }

        .page-title strong {
            font-weight: 700;
            color: var(--pure-black);
            position: relative;
        }

        .page-title strong::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--pure-black);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform var(--transition);
        }

        .page-title:hover strong::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .header-right {
            display: flex;
            gap: 15px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
        }

        .badge {
            padding: 10px 20px;
            background: var(--off-white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-full);
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge span {
            font-weight: 700;
            color: var(--pure-black);
        }

        .badge.warning {
            background: #fff0e0;
            border-color: var(--warning);
        }

        .badge.warning span {
            color: var(--warning);
        }

        /* -------------------------------------- */
        /* MAIN CONTAINER */
        /* -------------------------------------- */
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 30px;
        }

        /* -------------------------------------- */
        /* ADD EXPENSE FORM */
        /* -------------------------------------- */
        
        .form-card {
            background: var(--pure-white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-xl);
            padding: 30px;
            box-shadow: var(--shadow-lg);
            height: fit-content;
            animation: slideRight 0.5s ease;
            position: sticky;
            top: 30px;
        }

        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-title {
            font-size: 1.3em;
            font-weight: 600;
            color: var(--pure-black);
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--light-gray);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-title span {
            width: 40px;
            height: 40px;
            background: var(--pure-black);
            color: var(--pure-white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark-gray);
            font-weight: 500;
            font-size: 0.95em;
        }

        .input-field {
            width: 100%;
            padding: 15px 18px;
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-lg);
            font-size: 1em;
            transition: all var(--transition);
            background: var(--off-white);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--pure-black);
            background: var(--pure-white);
            box-shadow: 0 0 0 4px rgba(0,0,0,0.02);
        }

        .input-field::placeholder {
            color: var(--medium-gray);
            font-weight: 300;
        }

        /* Category Selector */
        .category-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-btn {
            padding: 12px;
            border: 1px solid var(--light-gray);
            background: var(--pure-white);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.95em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .category-btn:hover {
            border-color: var(--pure-black);
            background: var(--off-white);
        }

        .category-btn.active {
            background: var(--pure-black);
            color: var(--pure-white);
            border-color: var(--pure-black);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--pure-black);
            color: var(--pure-white);
            border: none;
            border-radius: var(--radius-xl);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-xl);
            background: var(--charcoal);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Quick Actions */
        .quick-actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .quick-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--light-gray);
            background: var(--pure-white);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.9em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .quick-btn:hover {
            border-color: var(--pure-black);
            background: var(--off-white);
            transform: translateY(-2px);
        }

        /* -------------------------------------- */
        /* EXPENSES TABLE */
        /* -------------------------------------- */
        
        .table-card {
            background: var(--pure-white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-xl);
            padding: 30px;
            box-shadow: var(--shadow-lg);
            animation: slideLeft 0.5s ease;
        }

        @keyframes slideLeft {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .table-title {
            font-size: 1.2em;
            color: var(--dark-gray);
        }

        .table-title span {
            font-weight: 700;
            color: var(--pure-black);
            margin-right: 5px;
        }

        .table-controls {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            padding: 10px 15px;
            border: 1px solid var(--light-gray);
            background: var(--pure-white);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.9em;
        }

        .control-btn:hover {
            border-color: var(--pure-black);
            background: var(--off-white);
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: var(--radius-lg);
            border: 1px solid var(--light-gray);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            background: var(--off-white);
            color: var(--dark-gray);
            font-weight: 600;
            padding: 18px 15px;
            font-size: 0.95em;
            border-bottom: 2px solid var(--light-gray);
            white-space: nowrap;
        }

        td {
            padding: 18px 15px;
            border-bottom: 1px solid var(--light-gray);
            color: var(--charcoal);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: all var(--transition);
        }

        tbody tr:hover {
            background: var(--off-white);
        }

        /* Expense Type Badge */
        .type-badge {
            padding: 6px 15px;
            border-radius: var(--radius-full);
            font-size: 0.9em;
            font-weight: 500;
            display: inline-block;
        }

        .type-badge.rent { background: #e3f2fd; color: #1976d2; }
        .type-badge.salary { background: #e8f5e8; color: #2e7d32; }
        .type-badge.electricity { background: #fff3e0; color: #f57c00; }
        .type-badge.water { background: #e0f2f1; color: #00796b; }
        .type-badge.phone { background: #f3e5f5; color: #7b1fa2; }
        .type-badge.transport { background: #ffebee; color: #c62828; }
        .type-badge.other { background: #f5f5f5; color: #616161; }

        /* Amount */
        .amount {
            font-weight: 700;
            color: var(--pure-black);
            font-size: 1.1em;
        }

        .amount.negative {
            color: var(--error);
        }

        /* Date */
        .date {
            color: var(--dark-gray);
            font-size: 0.95em;
        }

        /* Delete Button */
        .delete-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--light-gray);
            border-radius: 50%;
            background: var(--pure-white);
            color: var(--error);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            margin: 0 auto;
        }

        .delete-btn:hover {
            border-color: var(--error);
            background: #fff0f0;
            transform: rotate(90deg) scale(1.1);
        }

        /* -------------------------------------- */
        /* STATS CARDS */
        /* -------------------------------------- */
        
        .stats-grid {
            max-width: 1200px;
            margin: 30px auto 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .stat-card {
            background: var(--pure-white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: var(--off-white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: var(--pure-black);
        }

        .stat-info {
            flex: 1;
        }

        .stat-label {
            font-size: 0.9em;
            color: var(--medium-gray);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--pure-black);
        }

        .stat-change {
            font-size: 0.8em;
            margin-top: 5px;
        }

        .stat-change.positive {
            color: var(--success);
        }

        .stat-change.negative {
            color: var(--error);
        }

        /* -------------------------------------- */
        /* CHART SECTION */
        /* -------------------------------------- */
        
        .chart-container {
            max-width: 1200px;
            margin: 30px auto 0;
            background: var(--pure-white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-xl);
            padding: 30px;
        }

        .chart-title {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: var(--dark-gray);
        }

        .chart-bars {
            display: flex;
            gap: 20px;
            justify-content: space-around;
            align-items: flex-end;
            height: 200px;
        }

        .chart-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .chart-bar {
            width: 100%;
            background: var(--light-gray);
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            transition: height 0.5s ease;
            position: relative;
            min-height: 4px;
        }

        .chart-bar::before {
            content: attr(data-value);
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85em;
            color: var(--dark-gray);
            white-space: nowrap;
        }

        .chart-label {
            font-size: 0.85em;
            color: var(--medium-gray);
        }

        /* -------------------------------------- */
        /* NOTIFICATION */
        /* -------------------------------------- */
        
        .notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--pure-black);
            color: var(--pure-white);
            padding: 15px 30px;
            border-radius: var(--radius-xl);
            font-size: 0.95em;
            box-shadow: var(--shadow-xl);
            transform: translateY(100px);
            opacity: 0;
            transition: all var(--transition);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        .notification.success { background: var(--pure-black); }
        .notification.error { background: var(--error); }
        .notification.warning { background: var(--warning); }

        /* -------------------------------------- */
        /* EMPTY STATE */
        /* -------------------------------------- */
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 4em;
            opacity: 0.3;
            margin-bottom: 20px;
        }

        .empty-text {
            color: var(--medium-gray);
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        /* -------------------------------------- */
        /* LOADING SPINNER */
        /* -------------------------------------- */
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: var(--pure-white);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* -------------------------------------- */
        /* RESPONSIVE */
        /* -------------------------------------- */
        
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .form-card {
                position: static;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            body { padding: 15px; }
            .header { flex-direction: column; text-align: center; }
            .stats-grid { grid-template-columns: 1fr; }
            .chart-bars { flex-wrap: wrap; }
        }

        @media (max-width: 480px) {
            .page-title { font-size: 1.5em; }
            .category-selector { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <a href="index.html" class="back-button" title="العودة للرئيسية">←</a>
            <h1 class="page-title">
                <strong>💸 المصروفات</strong>
            </h1>
        </div>
        <div class="header-right">
            <div class="badge">
                <span id="todayCount">0</span> اليوم
            </div>
            <div class="badge">
                <span id="weekCount">0</span> هذا الأسبوع
            </div>
            <div class="badge warning">
                <span id="monthTotal">₪ 0</span> هذا الشهر
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Add Expense Form -->
        <div class="form-card">
            <div class="form-title">
                <span>➕</span>
                إضافة مصروف جديد
            </div>

            <div class="category-selector">
                <button class="category-btn active" onclick="selectCategory('إيجار')" data-category="إيجار">🏢 إيجار</button>
                <button class="category-btn" onclick="selectCategory('رواتب')" data-category="رواتب">👥 رواتب</button>
                <button class="category-btn" onclick="selectCategory('كهرباء')" data-category="كهرباء">⚡ كهرباء</button>
                <button class="category-btn" onclick="selectCategory('مياه')" data-category="مياه">💧 مياه</button>
                <button class="category-btn" onclick="selectCategory('هاتف')" data-category="هاتف">📞 هاتف</button>
                <button class="category-btn" onclick="selectCategory('مواصلات')" data-category="مواصلات">🚗 مواصلات</button>
            </div>

            <div class="input-group">
                <label class="input-label">نوع المصروف</label>
                <input type="text" id="type" class="input-field" placeholder="أدخل نوع المصروف..." autocomplete="off">
            </div>

            <div class="input-group">
                <label class="input-label">المبلغ</label>
                <input type="number" id="amount" class="input-field" placeholder="0.00" min="0" step="0.01">
            </div>

            <div class="input-group">
                <label class="input-label">التاريخ</label>
                <input type="date" id="date" class="input-field">
            </div>

            <div class="input-group">
                <label class="input-label">ملاحظات</label>
                <input type="text" id="notes" class="input-field" placeholder="ملاحظات إضافية (اختياري)">
            </div>

            <button class="submit-btn" onclick="addExpense()">
                <span>💾</span>
                إضافة المصروف
            </button>

            <div class="quick-actions">
                <button class="quick-btn" onclick="setToday()">
                    <span>📅</span> اليوم
                </button>
                <button class="quick-btn" onclick="setYesterday()">
                    <span>⬅️</span> أمس
                </button>
                <button class="quick-btn" onclick="clearForm()">
                    <span>🔄</span> مسح
                </button>
            </div>
        </div>

        <!-- Expenses Table -->
        <div class="table-card">
            <div class="table-header">
                <div class="table-title">
                    سجل المصروفات
                    <span id="expensesCount">(0)</span>
                </div>
                <div class="table-controls">
                    <button class="control-btn" onclick="filterBy('all')">الكل</button>
                    <button class="control-btn" onclick="filterBy('today')">اليوم</button>
                    <button class="control-btn" onclick="filterBy('week')">هذا الأسبوع</button>
                    <button class="control-btn" onclick="filterBy('month')">هذا الشهر</button>
                </div>
            </div>

            <div class="table-responsive">
                <table id="expensesTable">
                    <thead>
                        <tr>
                            <th>النوع</th>
                            <th>المبلغ</th>
                            <th>التاريخ</th>
                            <th>ملاحظات</th>
                            <th>حذف</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Data will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">📊</div>
            <div class="stat-info">
                <div class="stat-label">إجمالي المصروفات</div>
                <div class="stat-value" id="totalExpenses">₪ 0.00</div>
                <div class="stat-change" id="totalChange"></div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📅</div>
            <div class="stat-info">
                <div class="stat-label">هذا الشهر</div>
                <div class="stat-value" id="monthExpenses">₪ 0.00</div>
                <div class="stat-change" id="monthChange"></div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📆</div>
            <div class="stat-info">
                <div class="stat-label">هذا الأسبوع</div>
                <div class="stat-value" id="weekExpenses">₪ 0.00</div>
                <div class="stat-change" id="weekChange"></div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⚡</div>
            <div class="stat-info">
                <div class="stat-label">متوسط اليومي</div>
                <div class="stat-value" id="dailyAvg">₪ 0.00</div>
                <div class="stat-change" id="dailyChange"></div>
            </div>
        </div>
    </div>

    <!-- Chart Section -->
    <div class="chart-container">
        <div class="chart-title">تحليل المصروفات - آخر 7 أيام</div>
        <div class="chart-bars" id="chartBars">
            <!-- Chart bars will be inserted here -->
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script>
        /*
        ========================================
        EXPENSES PAGE - CORE FUNCTIONALITY
        VERSION: 2.0.0
        ========================================
        */

        // --------------------------------------
        // STATE MANAGEMENT
        // --------------------------------------
        
        let expenses = [];
        let currentFilter = 'all';
        let selectedCategory = 'إيجار';

        // Load expenses from localStorage
        function loadExpenses() {
            try {
                expenses = JSON.parse(localStorage.getItem("expenses")) || [];
                console.log("💰 تم تحميل", expenses.length, "مصروف");
            } catch (error) {
                console.error("خطأ في تحميل المصروفات:", error);
                expenses = [];
            }
            updateAll();
        }

        // Save expenses to localStorage
        function saveExpenses() {
            try {
                localStorage.setItem("expenses", JSON.stringify(expenses));
                console.log("💾 تم حفظ المصروفات");
            } catch (error) {
                console.error("خطأ في حفظ المصروفات:", error);
                showNotification("خطأ في حفظ البيانات", "error");
            }
        }

        // --------------------------------------
        // CATEGORY SELECTION
        // --------------------------------------
        
        window.selectCategory = function(category) {
            selectedCategory = category;
            document.getElementById("type").value = category;
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === category) {
                    btn.classList.add('active');
                }
            });
        };

        // --------------------------------------
        // DATE HANDLING
        // --------------------------------------
        
        function setToday() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById("date").value = today;
        }

        function setYesterday() {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            document.getElementById("date").value = yesterday.toISOString().split('T')[0];
        }

        function clearForm() {
            document.getElementById("type").value = "";
            document.getElementById("amount").value = "";
            document.getElementById("notes").value = "";
            setToday();
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
        }

        // --------------------------------------
        // RENDER EXPENSES
        // --------------------------------------
        
        function renderExpenses() {
            const tbody = document.getElementById("tableBody");
            const filtered = filterExpenses(expenses, currentFilter);
            
            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <div class="empty-icon">💰</div>
                                <div class="empty-text">لا توجد مصروفات</div>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            let html = '';
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach((expense, index) => {
                const originalIndex = expenses.findIndex(e => 
                    e.type === expense.type && 
                    e.amount === expense.amount && 
                    e.date === expense.date
                );
                
                const categoryClass = getCategoryClass(expense.type);
                
                html += `
                    <tr>
                        <td>
                            <span class="type-badge ${categoryClass}">${expense.type}</span>
                        </td>
                        <td>
                            <span class="amount">₪ ${parseFloat(expense.amount).toFixed(2)}</span>
                        </td>
                        <td>
                            <span class="date">${formatDate(expense.date)}</span>
                        </td>
                        <td>
                            ${expense.notes ? `<small style="color: var(--medium-gray)">${expense.notes}</small>` : '-'}
                        </td>
                        <td>
                            <button class="delete-btn" onclick="deleteExpense(${originalIndex})" title="حذف">✕</button>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
            document.getElementById("expensesCount").textContent = `(${filtered.length})`;
        }

        function getCategoryClass(type) {
            const categories = {
                'إيجار': 'rent',
                'رواتب': 'salary',
                'كهرباء': 'electricity',
                'مياه': 'water',
                'هاتف': 'phone',
                'مواصلات': 'transport'
            };
            return categories[type] || 'other';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('ar-EG', options);
        }

        // --------------------------------------
        // FILTERING
        // --------------------------------------
        
        window.filterBy = function(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.control-btn').forEach((btn, index) => {
                if (index === 0 && filter === 'all') btn.style.background = 'var(--pure-black)';
                else if (index === 1 && filter === 'today') btn.style.background = 'var(--pure-black)';
                else if (index === 2 && filter === 'week') btn.style.background = 'var(--pure-black)';
                else if (index === 3 && filter === 'month') btn.style.background = 'var(--pure-black)';
                else btn.style.background = 'var(--pure-white)';
            });
            
            renderExpenses();
            updateStats();
        };

        function filterExpenses(expensesList, filter) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const weekAgo = new Date(today);
            weekAgo.setDate(weekAgo.getDate() - 7);
            
            const monthAgo = new Date(today);
            monthAgo.setMonth(monthAgo.getMonth() - 1);
            
            return expensesList.filter(expense => {
                const expenseDate = new Date(expense.date);
                expenseDate.setHours(0, 0, 0, 0);
                
                switch(filter) {
                    case 'today':
                        return expenseDate.getTime() === today.getTime();
                    case 'week':
                        return expenseDate >= weekAgo;
                    case 'month':
                        return expenseDate >= monthAgo;
                    default:
                        return true;
                }
            });
        }

        // --------------------------------------
        // CRUD OPERATIONS
        // --------------------------------------
        
        window.addExpense = function() {
            const type = document.getElementById("type").value.trim();
            const amount = document.getElementById("amount").value;
            const date = document.getElementById("date").value;
            const notes = document.getElementById("notes").value.trim();
            
            if (!type) {
                showNotification("الرجاء إدخال نوع المصروف", "error");
                return;
            }
            
            if (!amount || amount <= 0) {
                showNotification("الرجاء إدخال مبلغ صحيح", "error");
                return;
            }
            
            if (!date) {
                showNotification("الرجاء اختيار التاريخ", "error");
                return;
            }
            
            const expense = {
                type,
                amount: parseFloat(amount),
                date,
                notes,
                timestamp: new Date().toISOString()
            };
            
            expenses.push(expense);
            saveExpenses();
            
            showNotification("✅ تم إضافة المصروف بنجاح", "success");
            
            // Clear form
            document.getElementById("type").value = "";
            document.getElementById("amount").value = "";
            document.getElementById("notes").value = "";
            setToday();
            
            // Remove active category
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            updateAll();
            
            // Animate new expense
            setTimeout(() => {
                const rows = document.querySelectorAll("#tableBody tr");
                if (rows.length > 0) {
                    rows[0].style.animation = "fadeIn 0.5s ease";
                }
            }, 100);
        };

        window.deleteExpense = function(index) {
            if (index === undefined || index === null) return;
            
            if (confirm("هل أنت متأكد من حذف هذا المصروف؟")) {
                const deleted = expenses[index];
                expenses.splice(index, 1);
                saveExpenses();
                updateAll();
                showNotification(`تم حذف ${deleted.type}`, "success");
            }
        };

        // --------------------------------------
        // STATISTICS
        // --------------------------------------
        
        function updateStats() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const weekAgo = new Date(today);
            weekAgo.setDate(weekAgo.getDate() - 7);
            
            const monthAgo = new Date(today);
            monthAgo.setMonth(monthAgo.getMonth() - 1);
            
            let total = 0;
            let monthTotal = 0;
            let weekTotal = 0;
            let todayTotal = 0;
            
            expenses.forEach(expense => {
                const amount = parseFloat(expense.amount) || 0;
                const expenseDate = new Date(expense.date);
                expenseDate.setHours(0, 0, 0, 0);
                
                total += amount;
                
                if (expenseDate >= monthAgo) {
                    monthTotal += amount;
                }
                
                if (expenseDate >= weekAgo) {
                    weekTotal += amount;
                }
                
                if (expenseDate.getTime() === today.getTime()) {
                    todayTotal += amount;
                }
            });
            
            // Update badges
            document.getElementById("todayCount").textContent = expenses.filter(e => 
                new Date(e.date).setHours(0,0,0,0) === today.getTime()
            ).length;
            
            document.getElementById("weekCount").textContent = expenses.filter(e => 
                new Date(e.date) >= weekAgo
            ).length;
            
            document.getElementById("monthTotal").textContent = `₪ ${monthTotal.toFixed(2)}`;
            
            // Update stats cards
            document.getElementById("totalExpenses").textContent = `₪ ${total.toFixed(2)}`;
            document.getElementById("monthExpenses").textContent = `₪ ${monthTotal.toFixed(2)}`;
            document.getElementById("weekExpenses").textContent = `₪ ${weekTotal.toFixed(2)}`;
            document.getElementById("dailyAvg").textContent = `₪ ${(monthTotal / 30).toFixed(2)}`;
            
            // Update chart
            updateChart();
        }

        // --------------------------------------
        // CHART
        // --------------------------------------
        
        function updateChart() {
            const chartBars = document.getElementById("chartBars");
            const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            let maxAmount = 0;
            const dailyTotals = [];
            
            // Calculate daily totals
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                
                let total = 0;
                expenses.forEach(expense => {
                    const expenseDate = new Date(expense.date);
                    expenseDate.setHours(0, 0, 0, 0);
                    
                    if (expenseDate.getTime() === date.getTime()) {
                        total += parseFloat(expense.amount) || 0;
                    }
                });
                
                dailyTotals.push({ date, total });
                if (total > maxAmount) maxAmount = total;
            }
            
            // Render chart
            let chartHtml = '';
            dailyTotals.forEach(({ date, total }) => {
                const height = maxAmount > 0 ? (total / maxAmount) * 150 : 0;
                const dayName = days[date.getDay()];
                
                chartHtml += `
                    <div class="chart-bar-wrapper">
                        <div class="chart-bar" style="height: ${height}px; background: ${total > 0 ? 'var(--pure-black)' : 'var(--light-gray)'}" data-value="₪ ${total.toFixed(0)}"></div>
                        <div class="chart-label">${dayName}</div>
                    </div>
                `;
            });
            
            chartBars.innerHTML = chartHtml;
        }

        // --------------------------------------
        // UTILITIES
        // --------------------------------------
        
        function updateAll() {
            renderExpenses();
            updateStats();
        }

        // Notification system
        function showNotification(message, type = "success") {
            const notification = document.getElementById("notification");
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            
            setTimeout(() => {
                notification.classList.remove("show");
            }, 3000);
        }

        // --------------------------------------
        // KEYBOARD SHORTCUTS
        // --------------------------------------
        
        document.addEventListener("keydown", (e) => {
            // Ctrl + N for new expense
            if (e.ctrlKey && e.key === "n") {
                e.preventDefault();
                document.getElementById("type").focus();
            }
            
            // Ctrl + S to save
            if (e.ctrlKey && e.key === "s") {
                e.preventDefault();
                addExpense();
            }
            
            // 1-6 for categories
            if (!e.ctrlKey && !e.altKey && e.key >= '1' && e.key <= '6') {
                const categories = ['إيجار', 'رواتب', 'كهرباء', 'مياه', 'هاتف', 'مواصلات'];
                const index = parseInt(e.key) - 1;
                if (categories[index]) {
                    selectCategory(categories[index]);
                }
            }
        });

        // --------------------------------------
        // INITIALIZATION
        // --------------------------------------
        
        document.addEventListener("DOMContentLoaded", () => {
            loadExpenses();
            
            // Set today's date
            setToday();
            
            // Add animation styles
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeIn {
                    from { opacity: 0; transform: translateY(20px); }
                    to { opacity: 1; transform: translateY(0); }
                }
            `;
            document.head.appendChild(style);
            
            console.log("✅ صفحة المصروفات جاهزة");
        });
    </script>
</body>
</html>
