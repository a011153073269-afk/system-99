<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة موديل | نظام إدارة محل الكوتشيات</title>
    <style>
        /*
        ========================================
        ADD PRODUCT PAGE - SHOE STORE MANAGEMENT SYSTEM
        VERSION: 2.0.0
        DESIGN: Minimal Black & White
        ========================================
        */

        /* -------------------------------------- */
        /* CSS RESET */
        /* -------------------------------------- */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif;
        }

        /* -------------------------------------- */
        /* VARIABLES */
        /* -------------------------------------- */
        
        :root {
            --pure-black: #000000;
            --pure-white: #ffffff;
            --off-white: #fafafa;
            --light-gray: #f0f0f0;
            --medium-gray: #cccccc;
            --dark-gray: #333333;
            --charcoal: #222222;
            --success: #2ecc71;
            --error: #e74c3c;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.06);
            --shadow-xl: 0 20px 40px rgba(0, 0, 0, 0.12);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 30px;
            --radius-full: 9999px;
            
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* -------------------------------------- */
        /* BASE STYLES */
        /* -------------------------------------- */
        
        body {
            direction: rtl;
            background: var(--pure-white);
            color: var(--charcoal);
            line-height: 1.6;
            min-height: 100vh;
            padding: 30px 20px;
            position: relative;
        }

        /* خلفية بنمط بسيط */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(var(--light-gray) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            pointer-events: none;
            z-index: -1;
        }

        /* -------------------------------------- */
        /* HEADER */
        /* -------------------------------------- */
        
        .header {
            max-width: 1000px;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 30px;
            background: var(--pure-white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0,0,0,0.02) 0%, transparent 70%);
            border-radius: 50%;
        }

        .back-button {
            width: 50px;
            height: 50px;
            border: 1px solid var(--light-gray);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--pure-white);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 1.3em;
            text-decoration: none;
            color: var(--charcoal);
            position: relative;
            z-index: 1;
        }

        .back-button:hover {
            border-color: var(--pure-black);
            transform: translateX(-5px) scale(1.1);
            box-shadow: var(--shadow-md);
        }

        .page-title {
            font-size: 2em;
            font-weight: 400;
            color: var(--charcoal);
            position: relative;
            z-index: 1;
        }

        .page-title strong {
            font-weight: 700;
            color: var(--pure-black);
            position: relative;
        }

        .page-title strong::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--pure-black);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform var(--transition);
        }

        .page-title:hover strong::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* -------------------------------------- */
        /* MAIN CONTAINER */
        /* -------------------------------------- */
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--pure-white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-xl);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* -------------------------------------- */
        /* FORM SECTIONS */
        /* -------------------------------------- */
        
        .form-section {
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px dashed var(--light-gray);
        }

        .form-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section-title {
            font-size: 1.3em;
            font-weight: 500;
            color: var(--dark-gray);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title span {
            width: 40px;
            height: 40px;
            background: var(--off-white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            color: var(--pure-black);
        }

        /* -------------------------------------- */
        /* INPUT FIELDS */
        /* -------------------------------------- */
        
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-label {
            display: block;
            margin-bottom: 10px;
            color: var(--dark-gray);
            font-weight: 500;
            font-size: 0.95em;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-lg);
            font-size: 1em;
            transition: all var(--transition);
            background: var(--off-white);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--pure-black);
            background: var(--pure-white);
            box-shadow: 0 0 0 4px rgba(0,0,0,0.02);
        }

        .input-field::placeholder {
            color: var(--medium-gray);
            font-weight: 300;
        }

        .input-hint {
            font-size: 0.85em;
            color: var(--medium-gray);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* -------------------------------------- */
        /* FILE UPLOAD */
        /* -------------------------------------- */
        
        .upload-area {
            border: 2px dashed var(--light-gray);
            border-radius: var(--radius-lg);
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--off-white);
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: var(--pure-black);
            background: var(--pure-white);
        }

        .upload-area.dragover {
            border-color: var(--pure-black);
            background: rgba(0,0,0,0.02);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3em;
            color: var(--medium-gray);
            margin-bottom: 15px;
            transition: all var(--transition);
        }

        .upload-area:hover .upload-icon {
            color: var(--pure-black);
            transform: translateY(-5px);
        }

        .upload-text {
            color: var(--dark-gray);
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .upload-hint {
            color: var(--medium-gray);
            font-size: 0.9em;
        }

        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* -------------------------------------- */
        /* IMAGE PREVIEW */
        /* -------------------------------------- */
        
        .preview-container {
            margin-top: 25px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .preview-container.active {
            display: block;
        }

        .preview-box {
            background: var(--off-white);
            border-radius: var(--radius-lg);
            padding: 25px;
            text-align: center;
            border: 1px solid var(--light-gray);
            position: relative;
        }

        .preview-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--light-gray);
            color: var(--dark-gray);
        }

        .preview-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: var(--radius-md);
            border: 3px solid var(--pure-white);
            box-shadow: var(--shadow-md);
            transition: all var(--transition);
        }

        .preview-image:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-lg);
        }

        .remove-image {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--pure-white);
            border: 1px solid var(--error);
            color: var(--error);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 1.2em;
        }

        .remove-image:hover {
            background: var(--error);
            color: var(--pure-white);
            transform: rotate(90deg);
        }

        /* -------------------------------------- */
        /* SIZES GRID */
        /* -------------------------------------- */
        
        .sizes-container {
            margin: 30px 0;
        }

        .sizes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .size-card {
            background: var(--off-white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-lg);
            padding: 15px;
            text-align: center;
            transition: all var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .size-card:hover {
            border-color: var(--pure-black);
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .size-card.selected {
            border-color: var(--pure-black);
            background: linear-gradient(145deg, var(--pure-white), var(--off-white));
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .size-card.selected::before {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 5px;
            color: var(--pure-black);
            font-size: 1.2em;
        }

        .size-number {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--pure-black);
            margin-bottom: 10px;
        }

        .size-input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-md);
            text-align: center;
            font-size: 1.1em;
            background: var(--pure-white);
            transition: all var(--transition);
            display: none;
        }

        .size-card.selected .size-input {
            display: block;
        }

        .size-input:focus {
            outline: none;
            border-color: var(--pure-black);
        }

        .size-input::placeholder {
            color: var(--medium-gray);
            font-size: 0.9em;
        }

        /* -------------------------------------- */
        /* BUTTONS */
        /* -------------------------------------- */
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn-primary {
            flex: 1;
            min-width: 200px;
            padding: 18px 30px;
            background: var(--pure-black);
            color: var(--pure-white);
            border: none;
            border-radius: var(--radius-xl);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-primary:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-xl);
            background: var(--charcoal);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            flex: 1;
            min-width: 200px;
            padding: 18px 30px;
            background: var(--pure-white);
            color: var(--pure-black);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-xl);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-secondary:hover {
            border-color: var(--pure-black);
            background: var(--off-white);
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        /* -------------------------------------- */
        /* PROGRESS BAR */
        /* -------------------------------------- */
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--light-gray);
            border-radius: var(--radius-full);
            margin: 40px 0 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--pure-black);
            width: 0%;
            transition: width var(--transition);
        }

        /* -------------------------------------- */
        /* NOTIFICATION */
        /* -------------------------------------- */
        
        .notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--pure-black);
            color: var(--pure-white);
            padding: 15px 30px;
            border-radius: var(--radius-xl);
            font-size: 0.95em;
            box-shadow: var(--shadow-xl);
            transform: translateY(100px);
            opacity: 0;
            transition: all var(--transition);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        .notification.success {
            background: var(--pure-black);
        }

        .notification.error {
            background: var(--error);
        }

        /* -------------------------------------- */
        /* LOADING SPINNER */
        /* -------------------------------------- */
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: var(--pure-white);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* -------------------------------------- */
        /* TOOLTIP */
        /* -------------------------------------- */
        
        .tooltip {
            position: relative;
            display: inline-block;
        }

        .tooltip:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--pure-black);
            color: var(--pure-white);
            padding: 5px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.85em;
            white-space: nowrap;
            margin-bottom: 5px;
        }

        /* -------------------------------------- */
        /* RESPONSIVE */
        /* -------------------------------------- */
        
        @media (max-width: 768px) {
            body { padding: 15px; }
            .container { padding: 25px; }
            .sizes-grid { grid-template-columns: repeat(3, 1fr); }
            .button-group { flex-direction: column; }
        }

        @media (max-width: 480px) {
            .header { flex-direction: column; text-align: center; }
            .sizes-grid { grid-template-columns: repeat(2, 1fr); }
            .page-title { font-size: 1.5em; }
        }

        /* -------------------------------------- */
        /* ANIMATIONS */
        /* -------------------------------------- */
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="index.html" class="back-button" title="العودة للرئيسية">←</a>
        <h1 class="page-title">
            <strong>➕ إضافة موديل</strong> جديد
        </h1>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- Model Info Section -->
        <div class="form-section">
            <div class="section-title">
                <span>1</span>
                معلومات الموديل
            </div>
            
            <div class="input-group">
                <label class="input-label">اسم الموديل</label>
                <input type="text" id="model" class="input-field" placeholder="أدخل اسم الموديل..." maxlength="50">
                <div class="input-hint">
                    <span>ℹ️</span>
                    <span id="modelCounter">0/50 حرف</span>
                </div>
            </div>
        </div>

        <!-- Image Upload Section -->
        <div class="form-section">
            <div class="section-title">
                <span>2</span>
                صورة المنتج
            </div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div class="upload-text">اضغط أو اسحب الصورة هنا</div>
                <div class="upload-hint">يدعم JPG, PNG, GIF (أقصى حجم 5MB)</div>
                <input type="file" id="image" class="file-input" accept="image/*">
            </div>

            <div class="preview-container" id="previewContainer">
                <div class="preview-box">
                    <div class="preview-label">
                        <span>🖼️</span>
                        <span>معاينة الصورة</span>
                    </div>
                    <img id="preview" class="preview-image" alt="معاينة الصورة">
                    <button class="remove-image" onclick="removeImage()" title="حذف الصورة">✕</button>
                </div>
            </div>
        </div>

        <!-- Sizes Section -->
        <div class="form-section">
            <div class="section-title">
                <span>3</span>
                المقاسات والكميات
            </div>

            <div class="sizes-container">
                <div class="sizes-grid" id="sizesGrid">
                    <!-- Sizes will be inserted here -->
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">ملاحظات (اختياري)</label>
                <input type="text" id="notes" class="input-field" placeholder="ملاحظات إضافية عن الموديل...">
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="button-group">
            <button class="btn-primary" onclick="addProduct()" id="submitBtn">
                <span>➕</span>
                إضافة للمخزن
            </button>
            <button class="btn-secondary" onclick="resetForm()">
                <span>↻</span>
                إعادة تعيين
            </button>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script>
        /*
        ========================================
        ADD PRODUCT PAGE - CORE FUNCTIONALITY
        VERSION: 2.0.0
        ========================================
        */

        // --------------------------------------
        // STATE MANAGEMENT
        // --------------------------------------
        
        let imageData = "";
        let selectedSizes = new Set();
        let products = [];

        // Load products from localStorage
        function loadProducts() {
            try {
                products = JSON.parse(localStorage.getItem("products")) || [];
            } catch (error) {
                console.error("خطأ في تحميل المنتجات:", error);
                products = [];
            }
        }

        // Save products to localStorage
        function saveProducts() {
            try {
                localStorage.setItem("products", JSON.stringify(products));
            } catch (error) {
                console.error("خطأ في حفظ المنتجات:", error);
                showNotification("خطأ في حفظ البيانات", "error");
            }
        }

        // --------------------------------------
        // SIZES GRID
        // --------------------------------------
        
        function createSizesGrid() {
            const grid = document.getElementById("sizesGrid");
            let html = "";
            
            for (let i = 38; i <= 45; i++) {
                html += `
                    <div class="size-card" onclick="toggleSize(${i})" id="size-${i}">
                        <div class="size-number">${i}</div>
                        <input type="number" 
                               class="size-input" 
                               id="qty${i}" 
                               placeholder="الكمية" 
                               min="0" 
                               onchange="validateQuantity(${i})"
                               onclick="event.stopPropagation()">
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }

        // Toggle size selection
        window.toggleSize = function(size) {
            const card = document.getElementById(`size-${size}`);
            const input = document.getElementById(`qty${size}`);
            
            if (selectedSizes.has(size)) {
                selectedSizes.delete(size);
                card.classList.remove("selected");
                input.value = "";
                input.style.display = "none";
            } else {
                selectedSizes.add(size);
                card.classList.add("selected");
                input.style.display = "block";
                input.focus();
            }
            
            updateProgress();
        };

        // Validate quantity
        window.validateQuantity = function(size) {
            const input = document.getElementById(`qty${size}`);
            let value = parseInt(input.value);
            
            if (isNaN(value) || value < 0) {
                input.value = 0;
            } else if (value > 999) {
                input.value = 999;
                showNotification("الحد الأقصى 999 قطعة", "error");
            }
        };

        // --------------------------------------
        // IMAGE HANDLING
        // --------------------------------------
        
        const fileInput = document.getElementById("image");
        const uploadArea = document.getElementById("uploadArea");
        const previewContainer = document.getElementById("previewContainer");
        const preview = document.getElementById("preview");

        // Drag and drop effects
        uploadArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            uploadArea.classList.add("dragover");
        });

        uploadArea.addEventListener("dragleave", () => {
            uploadArea.classList.remove("dragover");
        });

        uploadArea.addEventListener("drop", (e) => {
            e.preventDefault();
            uploadArea.classList.remove("dragover");
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith("image/")) {
                handleImage(file);
            } else {
                showNotification("الرجاء اختيار صورة صالحة", "error");
            }
        });

        fileInput.onchange = function() {
            const file = this.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showNotification("حجم الصورة كبير جداً (الحد الأقصى 5MB)", "error");
                    return;
                }
                handleImage(file);
            }
        };

        function handleImage(file) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                imageData = e.target.result;
                preview.src = imageData;
                previewContainer.classList.add("active");
                updateProgress();
                showNotification("تم تحميل الصورة بنجاح", "success");
            };
            
            reader.onerror = function() {
                showNotification("خطأ في قراءة الصورة", "error");
            };
            
            reader.readAsDataURL(file);
        }

        window.removeImage = function() {
            imageData = "";
            preview.src = "";
            previewContainer.classList.remove("active");
            fileInput.value = "";
            updateProgress();
        };

        // --------------------------------------
        // FORM VALIDATION
        // --------------------------------------
        
        function validateForm() {
            const model = document.getElementById("model").value.trim();
            
            if (!model) {
                showNotification("الرجاء إدخال اسم الموديل", "error");
                document.getElementById("model").focus();
                return false;
            }
            
            if (!imageData) {
                showNotification("الرجاء اختيار صورة للمنتج", "error");
                return false;
            }
            
            if (selectedSizes.size === 0) {
                showNotification("الرجاء اختيار مقاس واحد على الأقل", "error");
                return false;
            }
            
            // Check if at least one quantity is valid
            let hasValidQuantity = false;
            selectedSizes.forEach(size => {
                const qty = parseInt(document.getElementById(`qty${size}`).value);
                if (!isNaN(qty) && qty > 0) {
                    hasValidQuantity = true;
                }
            });
            
            if (!hasValidQuantity) {
                showNotification("الرجاء إدخال كمية صحيحة لمقاس واحد على الأقل", "error");
                return false;
            }
            
            return true;
        }

        // --------------------------------------
        // PRODUCT OPERATIONS
        // --------------------------------------
        
        window.addProduct = function() {
            if (!validateForm()) return;
            
            const submitBtn = document.getElementById("submitBtn");
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="spinner"></span> جاري الإضافة...';
            submitBtn.disabled = true;
            
            setTimeout(() => {
                try {
                    const model = document.getElementById("model").value.trim();
                    const notes = document.getElementById("notes").value.trim();
                    
                    let sizes = {};
                    selectedSizes.forEach(size => {
                        const qty = parseInt(document.getElementById(`qty${size}`).value) || 0;
                        if (qty > 0) {
                            sizes[size] = qty;
                        }
                    });
                    
                    // Check for duplicate model
                    const isDuplicate = products.some(p => 
                        p.model && p.model.toLowerCase() === model.toLowerCase()
                    );
                    
                    if (isDuplicate) {
                        showNotification("هذا الموديل موجود بالفعل", "error");
                        submitBtn.innerHTML = originalText;
                        submitBtn.disabled = false;
                        return;
                    }
                    
                    const product = {
                        model: model,
                        image: imageData,
                        sizes: sizes,
                        notes: notes,
                        dateAdded: new Date().toISOString(),
                        id: Date.now().toString()
                    };
                    
                    products.push(product);
                    saveProducts();
                    
                    showNotification("✅ تم إضافة الموديل بنجاح", "success");
                    
                    // Animation effect
                    document.querySelector(".container").style.animation = "shake 0.3s ease";
                    setTimeout(() => {
                        document.querySelector(".container").style.animation = "";
                    }, 300);
                    
                    // Auto redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = "store.html";
                    }, 2000);
                    
                } catch (error) {
                    console.error("خطأ:", error);
                    showNotification("حدث خطأ أثناء الإضافة", "error");
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            }, 800);
        };

        // Reset form
        window.resetForm = function() {
            if (confirm("هل أنت متأكد من إعادة تعيين النموذج؟")) {
                document.getElementById("model").value = "";
                document.getElementById("notes").value = "";
                removeImage();
                
                selectedSizes.clear();
                for (let i = 38; i <= 45; i++) {
                    const card = document.getElementById(`size-${i}`);
                    const input = document.getElementById(`qty${i}`);
                    if (card) card.classList.remove("selected");
                    if (input) {
                        input.style.display = "none";
                        input.value = "";
                    }
                }
                
                updateProgress();
                showNotification("تم إعادة تعيين النموذج", "success");
            }
        };

        // --------------------------------------
        // PROGRESS BAR
        // --------------------------------------
        
        function updateProgress() {
            let progress = 0;
            const model = document.getElementById("model").value.trim();
            
            if (model) progress += 33;
            if (imageData) progress += 33;
            if (selectedSizes.size > 0) progress += 34;
            
            document.getElementById("progressFill").style.width = progress + "%";
        }

        // --------------------------------------
        // MODEL NAME COUNTER
        // --------------------------------------
        
        document.getElementById("model").addEventListener("input", function() {
            const length = this.value.length;
            document.getElementById("modelCounter").textContent = `${length}/50 حرف`;
            updateProgress();
            
            if (length >= 50) {
                showNotification("لقد وصلت للحد الأقصى من الحروف", "error");
            }
        });

        // --------------------------------------
        // NOTIFICATION SYSTEM
        // --------------------------------------
        
        function showNotification(message, type = "success") {
            const notification = document.getElementById("notification");
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            
            setTimeout(() => {
                notification.classList.remove("show");
            }, 3000);
        }

        // --------------------------------------
        // KEYBOARD SHORTCUTS
        // --------------------------------------
        
        document.addEventListener("keydown", (e) => {
            // Ctrl + S to save
            if (e.ctrlKey && e.key === "s") {
                e.preventDefault();
                addProduct();
            }
            
            // Ctrl + R to reset
            if (e.ctrlKey && e.key === "r") {
                e.preventDefault();
                resetForm();
            }
            
            // ESC to clear selection
            if (e.key === "Escape") {
                if (selectedSizes.size > 0) {
                    selectedSizes.clear();
                    for (let i = 38; i <= 45; i++) {
                        const card = document.getElementById(`size-${i}`);
                        const input = document.getElementById(`qty${i}`);
                        if (card) card.classList.remove("selected");
                        if (input) {
                            input.style.display = "none";
                            input.value = "";
                        }
                    }
                    showNotification("تم إلغاء تحديد المقاسات", "success");
                }
            }
        });

        // --------------------------------------
        // INITIALIZATION
        // --------------------------------------
        
       
        // Prevent accidental form submission
        window.addEventListener("beforeunload", (e) => {
            if (document.getElementById("model").value.trim() || imageData || selectedSizes.size > 0) {
                e.preventDefault();
                e.returnValue = "";
            }
        });
    </script>
</body>
</html>
